services:
  - type: web
    name: real-estate-template
    env: node
    rootDir: Main
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SPACES_KEY
        sync: false
      - key: SPACES_SECRET
        sync: false
      - key: SPACES_BUCKET
        sync: false
      - key: SPACES_REGION
        sync: false
      - key: SPACES_ENDPOINT
        sync: false
      - key: SPACES_ORIGIN_URL
        sync: false
      - key: SPACES_CDN_URL
        sync: false
